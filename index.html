<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Drag Game</title>
  
<style>
  body {margin: 0;}
  .page {height: 100vh;}

    
.page1 {background: url("bg1.jpg") center/cover no-repeat;}
.page2 {background: url("bg2.jpg") center/cover no-repeat;}
.page3 {background: url("bg3.jpg") center/cover no-repeat;}
.page4 {background: url("bg4.jpg") center/cover no-repeat;}
.page5 {background: url("bg5.jpg") center/cover no-repeat;}

#oj1{
  width: 100px;
  position: absolute;
  top: 150px;
  left: 100px;
  cursor: grab;
}

#dropZone{
  width: 150px;
  height: 150px;
  border: 2px dashed white;
  position: absolute;
  top: 200px;
  left: 500px;
}
</style>
</head>

<body>

<div class="page page1"></div>

<div class="page page2">
  <div id="dropZone"></div>
</div>

<div class="page page3">
  <img id="oj1" src="oj1.png">
</div>

<div class="page page4"></div>
<div class="page page5"></div>

<script src="script.js" defer></script>

</body>
</html>
