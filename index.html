<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Drag Game</title>

  <style>
    #myImage {
      width: 150px;
      position: absolute;
      cursor: grab;
    }

    #dropZone {
      width: 160px;
      height: 160px;
      border: 2px dashed #333;
      position: absolute;
      top: 300px;
      left: 600px;
    }
  </style>
</head>

<body>

<!-- 📦 จุด mark (ต้องเพิ่มอันนี้) -->
<div id="dropZone"></div>

<!-- 🖼️ รูปที่ลาก -->
<img id="myImage" src="bag.png">

<!-- 🧠 JS -->
<script src="script.js"></script>

</body>
</html>
